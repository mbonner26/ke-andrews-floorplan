<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEA SiteSelect</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0f14;--c1:#13161d;--c2:#1a1e28;--b1:#252a36;--b2:#2f3545;--t1:#e8e9ed;--t2:#8b8f9e;--t3:#5c6070;--a1:#4f8cff;--a2:#34d399;--a3:#f59e0b;--dn:#ef4444;--fd:'Fraunces',Georgia,serif;--fb:'DM Sans',sans-serif}
.light{--bg:#f5f5f4;--c1:#ffffff;--c2:#f0efe9;--b1:#ddd9d0;--b2:#c8c3b8;--t1:#1a1a1a;--t2:#5c5a55;--t3:#8a877f;--a1:#2563eb;--a2:#059669;--a3:#d97706;--dn:#dc2626}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--fb);background:var(--bg);color:var(--t1);line-height:1.6;-webkit-font-smoothing:antialiased}
header{position:sticky;top:0;z-index:100;background:#fff;backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);padding:0 24px}
.hi{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
.lo{display:flex;flex-direction:column;align-items:flex-start;gap:1px}.lo img{height:30px}.lo .brand{font-family:var(--fb);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#5c5a55;margin-top:1px}
.nv{display:flex;gap:2px}.nv button{background:0;border:0;color:#5c5a55;font-family:var(--fb);font-size:12px;font-weight:500;padding:6px 11px;border-radius:7px;cursor:pointer;transition:.2s;white-space:nowrap}.nv button:hover,.nv button.on{color:#1a1a1a;background:#f0efe9}.nv button.on{color:#2563eb}
.ha{display:flex;gap:6px;align-items:center}
.bn{border:0;padding:6px 14px;border-radius:7px;font-family:var(--fb);font-size:11.5px;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:5px}.bn:hover{transform:translateY(-1px)}
.bp{background:var(--a1);color:#fff}.bs{background:var(--a2);color:#fff}.bw{background:var(--a3);color:#fff}
.bg{background:0;border:1px solid var(--b1);color:var(--t2)}.bg:hover{border-color:var(--b2);color:var(--t1)}
header .bg{border-color:#ddd9d0;color:#5c5a55}header .bg:hover{border-color:#c8c3b8;color:#1a1a1a}
.mt{display:flex;background:#f0efe9;border:1px solid #ddd9d0;border-radius:18px;padding:2px}.mt button{padding:4px 13px;border-radius:14px;border:0;font-family:var(--fb);font-size:11px;font-weight:600;cursor:pointer;background:0;color:#5c5a55;transition:.2s}.mt .ae{background:var(--a3);color:#fff}.mt .av{background:var(--a1);color:#fff}
main{max-width:1440px;margin:0 auto;padding:18px 24px 60px}
.sec{display:none;animation:fi .2s}.sec.on{display:block}@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1}}
.sh{margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--b1)}.sh h1{font-family:var(--fd);font-size:24px;font-weight:700;letter-spacing:-.03em;margin-bottom:2px}.sh p{color:var(--t2);font-size:12px}
.cd{background:var(--c1);border:1px solid var(--b1);border-radius:12px;padding:20px;margin-bottom:12px}
.ct{font-family:var(--fd);font-size:13px;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}
.ct .bd{font-family:var(--fb);font-size:10px;font-weight:600;padding:2px 8px;border-radius:16px;background:rgba(79,140,255,.15);color:var(--a1)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.hc{background:var(--c1);border:1px solid var(--b1);border-radius:12px;padding:18px;position:relative;overflow:hidden;transition:.25s}.hc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--a1),var(--a2));opacity:0;transition:.3s}.hc:hover::before{opacity:1}.hc:hover{border-color:var(--b2);transform:translateY(-2px)}
.hl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:7px}.hv{font-family:var(--fd);font-size:22px;font-weight:700}.hs{color:var(--t2);font-size:11px;margin-top:2px}
.sc{background:var(--c1);border:1px solid var(--b1);border-radius:10px;padding:12px;text-align:center}.sc .l{font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}.sc .v{font-family:var(--fd);font-size:17px;font-weight:700}.sc .s{font-size:10.5px;color:var(--t2);margin-top:2px}
.fr{display:grid;gap:10px;margin-bottom:10px}.fr.c2{grid-template-columns:1fr 1fr}.fr.c3{grid-template-columns:1fr 1fr 1fr}.fr.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:3px}.fg label{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.fg input,.fg select,.fg textarea{background:var(--c2);border:1px solid var(--b1);border-radius:7px;padding:7px 10px;color:var(--t1);font-family:var(--fb);font-size:12px;transition:.2s}.fg input:focus,.fg select:focus,.fg textarea:focus{outline:0;border-color:var(--a1);box-shadow:0 0 0 3px rgba(79,140,255,.15)}.fg textarea{resize:vertical;min-height:55px}.fg .hn{font-size:9.5px;color:var(--t3);margin-top:1px}
.tw{background:var(--c1);border:1px solid var(--b1);border-radius:12px;overflow:hidden;margin-bottom:12px}.tt{padding:12px 16px;font-family:var(--fd);font-size:13px;font-weight:600;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
table{width:100%;border-collapse:collapse;font-size:11.5px}thead th{background:var(--c2);padding:8px 10px;text-align:left;font-weight:600;font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--t2);border-bottom:1px solid var(--b1);white-space:nowrap}thead th.n{text-align:right}tbody td{padding:8px 10px;border-bottom:1px solid rgba(37,42,54,.5);white-space:nowrap}tbody td.n{text-align:right;font-variant-numeric:tabular-nums}tbody tr:hover{background:var(--row-hov,rgba(26,30,40,.7))}
.light tbody tr:hover{--row-hov:rgba(0,0,0,.04)}tbody tr:last-child td{border-bottom:0}
.ci{background:0;border:1px solid transparent;border-radius:4px;padding:3px 6px;color:var(--t1);font-family:var(--fb);font-size:11.5px;width:100%;text-align:right;transition:.15s;font-variant-numeric:tabular-nums}.ci:hover{border-color:var(--b1)}.ci:focus{outline:0;border-color:var(--a1);background:var(--c2)}
.tk-desc:hover{border-color:var(--b1)!important}.tk-desc:focus{outline:0}.tk-desc:empty::before{content:attr(placeholder);color:var(--t3)}
.bc{display:flex;flex-direction:column;gap:10px}.br{display:flex;align-items:center;gap:8px}.bl{width:64px;flex-shrink:0;font-size:10.5px;font-weight:500;color:var(--t2);text-align:right}.bt{flex:1;height:26px;background:var(--c2);border-radius:5px;overflow:hidden}.bf{height:100%;border-radius:5px;display:flex;align-items:center;padding:0 8px;font-size:10.5px;font-weight:600;color:#fff;min-width:fit-content;transition:width .8s cubic-bezier(.16,1,.3,1)}
.cc0{background:linear-gradient(90deg,#4f8cff,#6aa3ff)}.cc1{background:linear-gradient(90deg,#34d399,#5bdfb3)}.cc2{background:linear-gradient(90deg,#f59e0b,#fbbf24)}.cc3{background:linear-gradient(90deg,#a78bfa,#c4b5fd)}.cc4{background:linear-gradient(90deg,#ef4444,#f87171)}.cc5{background:linear-gradient(90deg,#2dd4bf,#5eead4)}.cc6{background:linear-gradient(90deg,#f472b6,#f9a8d4)}.cc7{background:linear-gradient(90deg,#fb923c,#fdba74)}.cc8{background:linear-gradient(90deg,#818cf8,#a5b4fc)}
.nc{background:var(--c1);border:1px solid var(--b1);border-radius:12px;padding:18px;position:relative;transition:.25s}.nc:hover{border-color:var(--b2);transform:translateY(-2px)}.nc.w{border-color:var(--a2);box-shadow:0 0 30px rgba(52,211,153,.08)}.nc.w::after{content:'BEST';position:absolute;top:-8px;right:12px;background:var(--a2);color:#0c0f14;font-size:9px;font-weight:800;padding:2px 8px;border-radius:4px;letter-spacing:.08em}
.il{display:flex;justify-content:space-between;padding:3px 0;font-size:11.5px}.il .k{color:var(--t2)}.il .vv{font-weight:600;font-variant-numeric:tabular-nums}
.it{display:flex;justify-content:space-between;margin-top:7px;padding-top:7px;border-top:1px solid var(--b1);font-weight:700}.it .vv{color:var(--a2);font-size:13px}
.sp{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}.sp button{padding:5px 14px;border-radius:18px;border:1px solid var(--b1);background:var(--c1);font-family:var(--fb);font-size:11.5px;font-weight:500;cursor:pointer;transition:.2s;color:var(--t2)}.sp button:hover{border-color:var(--a1);color:var(--t1)}.sp button.on{background:var(--a1);color:#fff;border-color:var(--a1)}.sp .at{border-style:dashed;color:var(--t3)}.sp .at:hover{color:var(--a1);border-color:var(--a1)}
.es{text-align:center;padding:50px 20px;color:var(--t3)}.es h3{font-family:var(--fd);font-size:16px;color:var(--t2);margin:12px 0 6px}.es p{font-size:12px;margin-bottom:16px}
.gt{width:100%;border-collapse:collapse;table-layout:fixed}.gt th{background:var(--c2);padding:8px;font-size:10px;font-weight:600;text-transform:uppercase;color:var(--t2);border-bottom:1px solid var(--b1);text-align:center}.gt th:first-child{text-align:left;width:280px}.gt td{padding:6px 3px;border-bottom:1px solid rgba(37,42,54,.4);font-size:11px;vertical-align:middle}.gt td:first-child{padding:8px 12px;color:var(--t2);line-height:1.4;white-space:normal;word-wrap:break-word;font-size:10px}
.gb{height:18px;border-radius:3px;margin:0 2px}.p1{background:linear-gradient(90deg,#4f8cff,#6aa3ff)}.p2{background:linear-gradient(90deg,#34d399,#5bdfb3)}.p3{background:linear-gradient(90deg,#f59e0b,#fbbf24)}.p4{background:linear-gradient(90deg,#a78bfa,#c4b5fd)}
.to{position:fixed;bottom:20px;right:20px;background:var(--c2);border:1px solid var(--a2);color:var(--a2);padding:10px 18px;border-radius:10px;font-size:12px;font-weight:500;z-index:300;animation:su .3s}@keyframes su{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.sov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;animation:fi .2s}
.smd{background:var(--c1);border:1px solid var(--b1);border-radius:14px;padding:28px 32px;width:520px;max-width:92vw;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.smd h2{font-family:var(--fd);font-size:20px;font-weight:700;margin-bottom:20px;letter-spacing:-.02em}
.sfg{margin-bottom:14px}.sfg label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:5px}
.sfg input{width:100%;padding:9px 12px;border:1px solid var(--b1);border-radius:8px;background:var(--c2);color:var(--t1);font-family:var(--fb);font-size:13px;outline:none;transition:.2s}.sfg input:focus{border-color:var(--a1)}
.sbtn{width:100%;margin-top:6px;padding:10px 0!important;justify-content:center}
.sres{margin-top:18px;border-top:1px solid var(--b1);padding-top:14px;min-height:60px;max-height:320px;overflow-y:auto}
.scl{position:absolute;top:14px;right:14px;background:0;border:0;color:var(--t3);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:.2s}.scl:hover{color:var(--t1);background:var(--c2)}
.hi2{color:var(--a2);font-weight:600}
.rb{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.thm{background:#f0efe9;border:1px solid #ddd9d0;border-radius:7px;padding:5px 10px;font-family:var(--fb);font-size:11px;font-weight:600;cursor:pointer;color:#5c5a55;transition:.2s;display:inline-flex;align-items:center;gap:5px}.thm:hover{border-color:#c8c3b8;color:#1a1a1a}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}
.light .ci{color:var(--t1)}.light .ci:focus{background:var(--c2)}
.light .sp button.on{background:var(--a1);color:#fff;border-color:var(--a1)}
.light .nc.w::after{color:#fff}
.light .bf{color:#fff}
.light tbody td{border-bottom:1px solid var(--b1)}
.light .gt td{border-bottom:1px solid var(--b1)}
@media(max-width:1024px){.g2,.g3{grid-template-columns:1fr}.g4,.g5{grid-template-columns:1fr 1fr}.fr.c3,.fr.c4{grid-template-columns:1fr 1fr}}
@media(max-width:768px){main{padding:12px}.nv{display:none}.g4,.g5{grid-template-columns:1fr}.fr.c2{grid-template-columns:1fr}}
@media print{header,.mt,.bn,.sp .at,.thm{display:none!important}.sec{display:block!important;page-break-inside:avoid}body{background:#fff;color:#1a1a1a}.hc,.sc,.tw,.cd,.nc,.scc{background:#fff;border-color:#ddd}}
.light .fg select option{background:var(--c1);color:var(--t1)}
</style>

const payroll=(s)=>s.labor.occs.reduce((a,o)=>a+o.hc*o.hr*2080,0);
const jobs=(s)=>s.labor.occs.reduce((a,o)=>a+o.hc,0);

function costs10(site){
  const r=site.rates,t=site.taxes,a=P.assume,sq=site.specs.sqft||P.facility.sqft,py=payroll(site);
  const c={fran:0,land:0,bldg:0,bpp:0,inv:0,sales:0,pay:0,rent:0,cam:0,water:0,ww:0,elec:0};
  // Build 10-year usage arrays with carry-forward from 5-year ramp
  const re=P.ramp.elec||[],rw=P.ramp.water||[],rww=P.ramp.ww||[];
  const eu10=[],wu10=[],wwu10=[];
  for(let i=0;i<10;i++){
    eu10[i]=(i<5&&i<re.length)?(+re[i]||0):(i>0?eu10[i-1]:0);
    wu10[i]=(i<5&&i<rw.length)?(+rw[i]||0):(i>0?wu10[i-1]:0);
    wwu10[i]=(i<5&&i<rww.length)?(+rww[i]||0):(i>0?wwu10[i-1]:0);
  }
  // BPP depreciation: M&E + FF&E capex depreciates each year (book value % by age)
  const deprME=P.capex.deprME||[0.91,0.82,0.73,0.64,0.55,0.46,0.37,0.28,0.19,0.10];
  const deprFF=P.capex.deprFF||[0.91,0.82,0.73,0.64,0.55,0.46,0.37,0.28,0.19,0.10];
  const capME=(P.capex.schedule[2]||[]).slice(0,5);
  const capFF=(P.capex.schedule[3]||[]).slice(0,5);
  for(let y=0;y<10;y++){
    c.pay+=py*Math.pow(1+a.payInc,y);
    c.rent+=r.rent*Math.pow(1+r.rentInc,y)*sq;
    c.cam+=r.cam*sq;
    c.elec+=eu10[y]*r.elec;
    c.water+=wu10[y]*360*r.water/1000;
    c.ww+=wwu10[y]*360*r.ww/1000;
    c.land+=site.vals.landVal*Math.pow(1+a.landApp,y)*t.prop;
    c.bldg+=site.vals.bldgVal*Math.pow(1+a.bldgApp,y)*t.prop;
    // BPP: sum of depreciated book values for all capex years placed in service
    let bppVal=0;
    for(let cy=0;cy<5;cy++){
      if(cy<=y){
        let age=y-cy;
        bppVal+=(+(capME[cy])||0)*(age<deprME.length?deprME[age]:0)+(+(capFF[cy])||0)*(age<deprFF.length?deprFF[age]:0);
      }
    }
    c.bpp+=bppVal*t.prop;
    const iv=(P.fin.inv||[])[Math.min(y,9)]||0;c.inv+=iv*t.inv;
    const nv=(+(P.fin.net||[])[Math.min(y,9)])||0;if(typeof t.fran==='number')c.fran+=nv*t.fran;
    if(y<5){const cx=P.capex.schedule.reduce((s,row)=>s+(+row[y]||0),0);c.sales+=cx*t.sales;}
  }return c;
}

function npvCalc(site){
  const rate=P.assume.npv||.06,r=site.rates,t=site.taxes,a=P.assume,sq=site.specs.sqft||P.facility.sqft,py=payroll(site);
  const c={fran:0,land:0,bldg:0,bpp:0,inv:0,sales:0,pay:0,rent:0,cam:0,water:0,ww:0,elec:0};
  const re=P.ramp.elec||[],rw=P.ramp.water||[],rww=P.ramp.ww||[];
  const eu10=[],wu10=[],wwu10=[];
  for(let i=0;i<10;i++){
    eu10[i]=(i<5&&i<re.length)?(+re[i]||0):(i>0?eu10[i-1]:0);
    wu10[i]=(i<5&&i<rw.length)?(+rw[i]||0):(i>0?wu10[i-1]:0);
    wwu10[i]=(i<5&&i<rww.length)?(+rww[i]||0):(i>0?wwu10[i-1]:0);
  }
  const deprME=P.capex.deprME||[.91,.82,.73,.64,.55,.46,.37,.28,.19,.10];
  const deprFF=P.capex.deprFF||[.91,.82,.73,.64,.55,.46,.37,.28,.19,.10];
  const capME=(P.capex.schedule[2]||[]).slice(0,5),capFF=(P.capex.schedule[3]||[]).slice(0,5);
  for(let y=0;y<10;y++){
    const df=1/Math.pow(1+rate,y+1);
    c.pay+=py*Math.pow(1+a.payInc,y)*df;
    c.rent+=r.rent*Math.pow(1+r.rentInc,y)*sq*df;
    c.cam+=r.cam*sq*df;
    c.elec+=eu10[y]*r.elec*df;
    c.water+=wu10[y]*360*r.water/1000*df;
    c.ww+=wwu10[y]*360*r.ww/1000*df;
    c.land+=site.vals.landVal*Math.pow(1+a.landApp,y)*t.prop*df;
    c.bldg+=site.vals.bldgVal*Math.pow(1+a.bldgApp,y)*t.prop*df;
    let bppVal=0;
    for(let cy=0;cy<5;cy++){if(cy<=y){let age=y-cy;bppVal+=(+(capME[cy])||0)*(age<deprME.length?deprME[age]:0)+(+(capFF[cy])||0)*(age<deprFF.length?deprFF[age]:0)}}
    c.bpp+=bppVal*t.prop*df;
    const iv=(P.fin.inv||[])[Math.min(y,9)]||0;c.inv+=iv*t.inv*df;
    const nv=(+(P.fin.net||[])[Math.min(y,9)])||0;if(typeof t.fran==='number')c.fran+=nv*t.fran*df;
    if(y<5){const cx=P.capex.schedule.reduce((s,row)=>s+(+row[y]||0),0);c.sales+=cx*t.sales*df;}
  }
  const inc={};['local','state','util','salesEx','utilSalesTax'].forEach(k=>{inc[k]=(site.inc[k]||[]).reduce((a,v,y)=>a+(+v||0)/Math.pow(1+rate,y+1),0)});
  const tc=Object.values(c).reduce((a,b)=>a+b,0),ti=Object.values(inc).reduce((a,b)=>a+b,0);
  return{costs:c,incs:inc,totalCost:tc,totalInc:ti,net:tc-ti};
}

@page{@top-left{content:none}@top-center{content:none}@top-right{content:none}@bottom-left{content:none}@bottom-center{content:none}@bottom-right{content:none}}
.cover{page-break-after:always;min-height:90vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.sec-break{page-break-before:always}
.no-break{page-break-inside:avoid}
.sec-title{font-family:'Fraunces',serif;font-size:17px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #2563eb;color:#1a1a1a}
.sub-title{font-family:'Fraunces',serif;font-size:13px;font-weight:600;margin:16px 0 8px;color:#1a1a1a}
table{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:12px}
thead th{background:#f0efe9;padding:6px 8px;text-align:left;font-weight:600;font-size:8.5px;text-transform:uppercase;letter-spacing:.05em;color:#5c5a55;border-bottom:1px solid #ddd9d0}
thead th.n{text-align:right}
tbody td{padding:5px 8px;border-bottom:1px solid #eee;font-size:10px}
tbody td.n{text-align:right;font-variant-numeric:tabular-nums}
tfoot td{padding:6px 8px;border-top:2px solid #ddd9d0;font-weight:700;font-size:10px}
tfoot td.n{text-align:right;font-variant-numeric:tabular-nums}
.hi2{color:#059669;font-weight:600}
.kpi-grid{display:grid;gap:10px;margin-bottom:16px}
.kpi-grid.c3{grid-template-columns:1fr 1fr 1fr}
.kpi-grid.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.kpi-grid.c5{grid-template-columns:1fr 1fr 1fr 1fr 1fr}
.kpi{border:1px solid #ddd9d0;border-radius:8px;padding:12px;text-align:center}
.kpi .lbl{font-size:8px;text-transform:uppercase;letter-spacing:.06em;color:#8a877f;margin-bottom:4px}
.kpi .val{font-family:'Fraunces',serif;font-size:18px;font-weight:700}
.kpi .sub{font-size:9px;color:#5c5a55;margin-top:2px}
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.bar-lbl{width:120px;flex-shrink:0;font-size:9px;text-align:right;color:#5c5a55}
.bar-trk{flex:1;height:18px;background:#f0efe9;border-radius:3px;overflow:hidden}
.bar-fl{height:100%;border-radius:3px;display:flex;align-items:center;padding:0 6px;font-size:8px;font-weight:600;color:#fff;min-width:fit-content}
.cc0{background:#2563eb}.cc1{background:#059669}.cc2{background:#d97706}.cc3{background:#7c3aed}.cc4{background:#dc2626}
.card{border:1px solid #ddd9d0;border-radius:8px;padding:14px;margin-bottom:10px}
.card-title{font-family:'Fraunces',serif;font-size:11px;font-weight:600;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #eee}
.il{display:flex;justify-content:space-between;padding:3px 0;font-size:10px}.il .k{color:#5c5a55}.il .vv{font-weight:600;font-variant-numeric:tabular-nums}
.it{display:flex;justify-content:space-between;margin-top:6px;padding-top:6px;border-top:1px solid #ddd9d0;font-weight:700;font-size:11px}
.best-box{border:2px solid #059669;border-radius:10px;padding:16px;text-align:center;margin:16px 0;background:#f0fdf4}
.best-box .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:#059669;font-weight:700;margin-bottom:4px}
.best-box .val{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:#059669}
.best-box .sub{font-size:10px;color:#5c5a55;margin-top:2px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.gt{width:100%;border-collapse:collapse;table-layout:fixed}
.gt th{background:#f0efe9;padding:6px 4px;font-size:8px;font-weight:600;text-transform:uppercase;color:#5c5a55;border-bottom:1px solid #ddd9d0;text-align:center}
.gt th:first-child{text-align:left;width:260px}
.gt td{padding:4px 3px;border-bottom:1px solid #eee;font-size:9px;vertical-align:middle}
.gt td:first-child{padding:4px 8px;color:#5c5a55;line-height:1.3;white-space:normal;word-wrap:break-word;font-size:9px}
.gb{height:14px;border-radius:2px;margin:0 1px}
.p1{background:#2563eb}.p2{background:#059669}.p3{background:#d97706}.p4{background:#7c3aed}
`;
}


function rptCover(logo){
  const dt=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  let h='<div class="cover">';
  if(logo)h+='<img src="'+logo+'" style="width:220px;margin-bottom:8px">';
  h+='<div style="font-size:9px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:#5c5a55;margin-bottom:50px">KEA SiteSelect</div>';
  h+='<div style="width:60px;height:2px;background:#2563eb;margin-bottom:50px"></div>';
  h+='<div style="font-family:\'Fraunces\',serif;font-size:28px;font-weight:700;margin-bottom:10px">'+esc(P.name||'Site Selection Analysis')+'</div>';
  if(P.desc)h+='<div style="font-size:12px;color:#5c5a55;max-width:480px;margin:0 auto 30px">'+esc(P.desc)+'</div>';
  if(P.client&&P.client.company){
    h+='<div style="font-size:10px;color:#8a877f;margin-bottom:4px">Prepared for</div>';
    h+='<div style="font-size:15px;font-weight:600;margin-bottom:2px">'+esc(P.client.company)+'</div>';
    if(P.client.contact)h+='<div style="font-size:11px;color:#5c5a55">'+esc(P.client.contact)+'</div>';
    if(P.client.email)h+='<div style="font-size:10px;color:#8a877f;margin-top:2px">'+esc(P.client.email)+'</div>';
  }
  h+='<div style="margin-top:40px;font-size:11px;color:#8a877f">'+dt+'</div>';
  h+='<div style="margin-top:24px;padding:4px 18px;border:1px solid #ddd9d0;border-radius:4px;font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#8a877f">Confidential</div>';
  h+='</div>';
  return h;
}

function buildDetailedReport(logo){
  const as=allSites();
  const sd=as.map(s=>{const c=costs10(s);const op=Object.values(c).reduce((a,b)=>a+b,0);return{...s,c,op,it:incTotal(s),net:op-incTotal(s),sc:wScore(s,P.weights),py:payroll(s),jb:jobs(s)}});
  const minNet=Math.min(...sd.map(x=>x.net));
  const maxSc=Math.max(...sd.map(x=>x.sc));
  const totalCapex=P.capex.schedule.reduce((a,r)=>a+r.reduce((x,y)=>x+(+y||0),0),0);
  const costKeys=['fran','land','bldg','bpp','inv','sales','pay','rent','cam','water','ww','elec'];
  const costLabels={fran:'Franchise Tax',land:'Land Tax',bldg:'Building Tax',bpp:'BPP Tax',inv:'Inventory Tax',sales:'Sales Tax',pay:'Payroll',rent:'Rent',cam:'CAM',water:'Water',ww:'Waste Water',elec:'Electricity'};
  const incKeys=['local','state','util','salesEx','utilSalesTax'];
  const incLabels={local:'Local',state:'State',util:'Utility',salesEx:'Sales Tax Exemption',utilSalesTax:'Utility Sales Tax'};
  const scoKeys=['ops','labor','biz','tax','inc','qual'];
  const scoLabels={ops:'Operating Costs',labor:'Labor',biz:'Business Climate',tax:'Tax Climate',inc:'Incentives',qual:'Qualitative'};
  const qualKeys=['crime','taxRank','bizRank','homeCost','qol','interstate'];
  const qualLabels={crime:'Crime Rate (%)',taxRank:'Tax Climate Rank',bizRank:'Biz Climate Rank',homeCost:'Avg Home Cost ($)',qol:'Quality of Life',interstate:'Nearest Interstate'};

  let h='<!DOCTYPE html><html><head><meta charset="UTF-8"><title> </title><style>'+rptCSS()+'</style></head><body>';

  // Cover
  h+=rptCover(logo);

  // === EXECUTIVE OVERVIEW ===
  h+='<div class="sec-break">';
  h+='<div class="sec-title">Executive Overview</div>';
  h+='<div class="kpi-grid c3">';
  h+='<div class="kpi"><div class="lbl">Total Capital Expenditure</div><div class="val">'+fm(totalCapex)+'</div></div>';
  h+='<div class="kpi"><div class="lbl">Jobs Created</div><div class="val">'+Number(P.jobs||sd.reduce((a,x)=>Math.max(a,x.jb),0)).toLocaleString()+'</div></div>';
  h+='<div class="kpi"><div class="lbl">Facility Size</div><div class="val">'+Number(P.facility.sqft||0).toLocaleString()+' SF</div></div>';
  h+='</div>';
  // Net cost ranking
  h+='<div class="sub-title">Net 10-Year Cost Ranking</div>';
  const maxOp=Math.max(...sd.map(x=>x.op));
  sd.slice().sort((a,b)=>a.net-b.net).forEach((x,i)=>{
    const pct=maxOp>0?Math.round(x.net/maxOp*100):0;
    h+='<div class="bar-row"><div class="bar-lbl">'+esc(x.name)+'</div><div class="bar-trk"><div class="bar-fl cc'+(i%5)+'" style="width:'+Math.max(pct,8)+'%">'+ff(x.net)+'</div></div></div>';
  });
  // Scoring ranking
  h+='<div class="sub-title" style="margin-top:16px">Weighted Scoring Ranking</div>';
  const maxScVal=Math.max(...sd.map(x=>x.sc),1);
  sd.slice().sort((a,b)=>b.sc-a.sc).forEach((x,i)=>{
    const pct=Math.round(x.sc/maxScVal*100);
    h+='<div class="bar-row"><div class="bar-lbl">'+esc(x.name)+'</div><div class="bar-trk"><div class="bar-fl cc'+(i%5)+'" style="width:'+Math.max(pct,8)+'%">'+x.sc.toFixed(2)+'</div></div></div>';
  });
  h+='</div>';

  // === SITE COMPARISON ===
  h+='<div class="sec-break">';
  h+='<div class="sec-title">Site Comparison - Rates &amp; Taxes</div>';
  const siteRows=[
    {l:'State',fn:s=>s.stN},{l:'County',fn:s=>s.county},
    {l:'Electricity ($/kWh)',fn:s=>s.rates.elec,fmt:v=>'$'+Number(v).toFixed(4),num:true,low:true},
    {l:'Water ($/1K gal)',fn:s=>'$'+Number(s.rates.water).toFixed(2),num:true},
    {l:'Waste Water ($/1K gal)',fn:s=>'$'+Number(s.rates.ww).toFixed(2),num:true},
    {l:'Rent ($/SF/yr)',fn:s=>'$'+Number(s.rates.rent).toFixed(2),num:true},
    {l:'Abatement (yrs)',fn:s=>s.rates.abate,num:true},
    {l:'Rent Inc. (%)',fn:s=>pc(s.rates.rentInc),num:true},
    {l:'CAM ($/SF)',fn:s=>'$'+Number(s.rates.cam).toFixed(2),num:true},
    {l:'Property Tax',fn:s=>pc(s.taxes.prop),num:true},
    {l:'Sales Tax',fn:s=>pc(s.taxes.sales),num:true},
    {l:'Inventory Tax',fn:s=>pc(s.taxes.inv),num:true},
    {l:'Franchise Tax',fn:s=>pc(s.taxes.fran),num:true}
  ];
  h+='<table><thead><tr><th>Metric</th>';
  as.forEach(s=>{h+='<th class="n">'+esc(s.name)+'</th>'});
  h+='</tr></thead><tbody>';
  siteRows.forEach(r=>{
    h+='<tr><td style="font-weight:600">'+r.l+'</td>';
    const vals=as.map(r.fn);
    as.forEach((s,i)=>{h+='<td class="n">'+esc(String(vals[i]))+'</td>'});
    h+='</tr>';
  });
  h+='</tbody></table>';
  h+='</div>';

  // === 10-YEAR OPERATING COSTS ===
  h+='<div class="sec-break">';
  h+='<div class="sec-title">10-Year Operating Costs</div>';
  h+='<table><thead><tr><th>Cost Category</th>';
  sd.forEach(s=>{h+='<th class="n">'+esc(s.name)+'</th>'});
  h+='</tr></thead><tbody>';
  costKeys.forEach(k=>{
    const vals=sd.map(s=>s.c[k]);const mn=Math.min(...vals);
    h+='<tr><td style="font-weight:500">'+costLabels[k]+'</td>';
    sd.forEach(s=>{const v=s.c[k];h+='<td class="n'+(v===mn&&mn>0?' hi2':'')+'">'+ff(v)+'</td>'});
    h+='</tr>';
  });
  h+='</tbody><tfoot><tr><td style="font-weight:700">Total</td>';
  sd.forEach(s=>{h+='<td class="n'+(s.net===minNet?' hi2':'')+'">'+ff(s.op)+'</td>'});
  h+='</tr></tfoot></table>';
  h+='</div>';

  // === LABOR ANALYSIS ===
  h+='<div class="sec-break">';
  h+='<div class="sec-title">Labor Analysis</div>';
  h+='<div class="kpi-grid c'+Math.min(sd.length,4)+'">';
  sd.forEach(s=>{
    h+='<div class="kpi"><div class="lbl">'+esc(s.name)+'</div><div class="val">'+ff(s.py)+'</div><div class="sub">'+s.jb+' positions &bull; Annual Payroll</div></div>';
  });
  h+='</div>';
  // Payroll comparison bars
  h+='<div class="sub-title">Annual Payroll Comparison</div>';
  const maxPy=Math.max(...sd.map(x=>x.py));
  sd.forEach((s,i)=>{
    const pct=maxPy>0?Math.round(s.py/maxPy*100):0;
    h+='<div class="bar-row"><div class="bar-lbl">'+esc(s.name)+'</div><div class="bar-trk"><div class="bar-fl cc'+(i%5)+'" style="width:'+Math.max(pct,8)+'%">'+ff(s.py)+'</div></div></div>';
  });
  // Occupation tables per site
  sd.forEach(s=>{
    if(s.labor.occs&&s.labor.occs.length){
      h+='<div class="sub-title" style="margin-top:14px">'+esc(s.name)+' - Occupations</div>';
      h+='<table class="no-break"><thead><tr><th>Occupation</th><th class="n">HC</th><th class="n">Hourly Rate</th><th class="n">Annual</th></tr></thead><tbody>';
      s.labor.occs.forEach(o=>{
        h+='<tr><td>'+esc(o.title)+'</td><td class="n">'+o.hc+'</td><td class="n">$'+Number(o.hr).toFixed(2)+'</td><td class="n">'+ff(o.hc*o.hr*2080)+'</td></tr>';
      });
      h+='</tbody></table>';
    }
  });
  h+='</div>';

  // === INCENTIVES ===
  h+='<div class="sec-break">';
  h+='<div class="sec-title">Incentive Breakdown</div>';
  const cols=Math.min(sd.length,3);
  h+='<div class="grid'+cols+'">';
  sd.forEach(s=>{
    h+='<div class="card"><div class="card-title">'+esc(s.name)+'</div>';
    incKeys.forEach(k=>{
      const t=(s.inc[k]||[]).reduce((a,v)=>a+(+v||0),0);
      h+='<div class="il"><span class="k">'+incLabels[k]+'</span><span class="vv">'+ff(t)+'</span></div>';
    });
    h+='<div class="it"><span>Total Incentives</span><span class="vv" style="color:#059669">'+ff(s.it)+'</span></div>';
    h+='</div>';
  });
  h+='</div>';
  // Incentive totals table
  h+='<div class="sub-title" style="margin-top:12px">Incentive Totals Comparison</div>';
  h+='<table><thead><tr><th>Category</th>';
  sd.forEach(s=>{h+='<th class="n">'+esc(s.name)+'</th>'});
  h+='</tr></thead><tbody>';
  incKeys.forEach(k=>{
    h+='<tr><td style="font-weight:500">'+incLabels[k]+'</td>';
    sd.forEach(s=>{const t=(s.inc[k]||[]).reduce((a,v)=>a+(+v||0),0);h+='<td class="n">'+ff(t)+'</td>'});
    h+='</tr>';
  });
  h+='</tbody><tfoot><tr><td style="font-weight:700">Total</td>';
  sd.forEach(s=>{h+='<td class="n" style="color:#059669;font-weight:700">'+ff(s.it)+'</td>'});
  h+='</tr></tfoot></table>';
  h+='</div>';

  // === QUALITATIVE METRICS ===
  h+='<div class="sec-break">';
  h+='<div class="sec-title">Qualitative Metrics</div>';
  h+='<table><thead><tr><th>Metric</th>';
  sd.forEach(s=>{h+='<th class="n">'+esc(s.name)+'</th>'});
  h+='</tr></thead><tbody>';
  qualKeys.forEach(k=>{
    h+='<tr><td style="font-weight:500">'+qualLabels[k]+'</td>';
    sd.forEach(s=>{
      let v=s.qual[k];
      if(k==='crime')v=(v*100).toFixed(2)+'%';
      else if(k==='homeCost')v=ff(v);
      else v=esc(String(v));
      h+='<td class="n">'+v+'</td>';
    });
    h+='</tr>';
  });
  // Airports rows from arrays
  var maxAp=Math.max.apply(null,sd.map(function(s){return(s.qual.airports||[]).length}).concat([0]));
  for(var ai=0;ai<maxAp;ai++){
    h+='<tr><td style="font-weight:500">Airport'+(maxAp>1?' '+(ai+1):'')+'</td>';
    sd.forEach(function(s){var ap=(s.qual.airports||[])[ai];h+='<td class="n">'+esc(ap?ap.name:'')+'</td>'});
    h+='</tr>';
    h+='<tr><td style="font-weight:500">Airport'+(maxAp>1?' '+(ai+1):'')+' Address</td>';
    sd.forEach(function(s){var ap=(s.qual.airports||[])[ai];h+='<td class="n">'+esc(ap?ap.addr:'')+'</td>'});
    h+='</tr>';
  }
  // Ports rows from arrays
  var maxPt=Math.max.apply(null,sd.map(function(s){return(s.qual.ports||[]).length}).concat([0]));
  for(var pi=0;pi<maxPt;pi++){
    h+='<tr><td style="font-weight:500">Port'+(maxPt>1?' '+(pi+1):'')+'</td>';
    sd.forEach(function(s){var pt=(s.qual.ports||[])[pi];h+='<td class="n">'+esc(pt?pt.name:'')+'</td>'});
    h+='</tr>';
    h+='<tr><td style="font-weight:500">Port'+(maxPt>1?' '+(pi+1):'')+' Address</td>';
    sd.forEach(function(s){var pt=(s.qual.ports||[])[pi];h+='<td class="n">'+esc(pt?pt.addr:'')+'</td>'});
    h+='</tr>';
  }
  h+='</tbody></table>';
  h+='</div>';

  // === NPV ANALYSIS ===
  h+='<div class="sec-break">';
  h+='<div class="sec-title">Net Present Value Analysis</div>';
  h+='<div class="grid'+cols+'" style="margin-bottom:16px">';
  sd.forEach(s=>{
    const best=s.net===minNet;
    h+='<div class="card" style="'+(best?'border-color:#059669':'')+'"><div class="card-title">'+esc(s.name)+(best?' <span style="color:#059669;font-size:9px;font-weight:700">BEST</span>':'')+'</div>';
    h+='<div class="il"><span class="k">Operating Costs</span><span class="vv">'+ff(s.op)+'</span></div>';
    h+='<div class="il"><span class="k">Total Incentives</span><span class="vv" style="color:#059669">-'+ff(s.it)+'</span></div>';
    h+='<div class="it"><span>Net 10-Year Cost</span><span class="vv" style="color:'+(best?'#059669':'#1a1a1a')+'">'+ff(s.net)+'</span></div>';
    h+='</div>';
  });
  h+='</div>';
  // Detailed breakdown per site
  sd.forEach(s=>{
    h+='<div class="no-break" style="margin-bottom:14px">';
    h+='<div class="sub-title">'+esc(s.name)+' - Cost Detail</div>';
    h+='<div class="grid2"><div>';
    h+='<div style="font-size:9px;font-weight:600;text-transform:uppercase;color:#8a877f;margin-bottom:4px">Operating Costs</div>';
    costKeys.forEach(k=>{
      h+='<div class="il"><span class="k">'+costLabels[k]+'</span><span class="vv">'+ff(s.c[k])+'</span></div>';
    });
    h+='<div class="it"><span>Total</span><span class="vv">'+ff(s.op)+'</span></div>';
    h+='</div><div>';
    h+='<div style="font-size:9px;font-weight:600;text-transform:uppercase;color:#8a877f;margin-bottom:4px">Incentives</div>';
    incKeys.forEach(k=>{
      const t=(s.inc[k]||[]).reduce((a,v)=>a+(+v||0),0);
      h+='<div class="il"><span class="k">'+incLabels[k]+'</span><span class="vv" style="color:#059669">'+ff(t)+'</span></div>';
    });
    h+='<div class="it"><span>Total</span><span class="vv" style="color:#059669">'+ff(s.it)+'</span></div>';
    h+='</div></div></div>';
  });
  h+='</div>';

  // === SCORING ===
  h+='<div class="sec-break">';
  h+='<div class="sec-title">Scoring Analysis</div>';
  // Raw scores
  h+='<div class="sub-title">Raw Scores (1-3 Scale)</div>';
  h+='<table><thead><tr><th>Category</th>';
  sd.forEach(s=>{h+='<th class="n">'+esc(s.name)+'</th>'});
  h+='</tr></thead><tbody>';
  scoKeys.forEach(k=>{
    h+='<tr><td style="font-weight:500">'+scoLabels[k]+'</td>';
    sd.forEach(s=>{h+='<td class="n">'+(s.scores[k]||0).toFixed(1)+'</td>'});
    h+='</tr>';
  });
  h+='</tbody></table>';
  // Weights
  h+='<div class="sub-title">Weight of Criteria</div>';
  h+='<table style="width:auto"><thead><tr><th>Category</th><th class="n">Weight</th></tr></thead><tbody>';
  scoKeys.forEach(k=>{
    h+='<tr><td>'+scoLabels[k]+'</td><td class="n">'+pc(P.weights[k])+'</td></tr>';
  });
  h+='</tbody></table>';
  // Weighted summary
  h+='<div class="sub-title">Weighted Scoring Summary</div>';
  h+='<table><thead><tr><th>Category</th><th class="n">Weight</th>';
  sd.forEach(s=>{h+='<th class="n">'+esc(s.name)+'</th>'});
  h+='</tr></thead><tbody>';
  scoKeys.forEach(k=>{
    h+='<tr><td style="font-weight:500">'+scoLabels[k]+'</td><td class="n">'+pc(P.weights[k])+'</td>';
    sd.forEach(s=>{h+='<td class="n">'+((s.scores[k]||0)*P.weights[k]*3).toFixed(2)+'</td>'});
    h+='</tr>';
  });
  h+='</tbody><tfoot><tr><td style="font-weight:700">Total</td><td></td>';
  sd.forEach(s=>{h+='<td class="n'+(s.sc===maxSc?' hi2':'')+'">'+s.sc.toFixed(2)+'</td>'});
  h+='</tr></tfoot></table>';
  // Rankings
  h+='<div class="sub-title">Rankings</div>';

  h+='</tr></thead><tbody>';
  finRows.forEach(r=>{
    h+='<tr><td style="font-weight:500">'+r.l+'</td>';
    for(let y=0;y<10;y++){h+='<td class="n">'+fm((P.fin[r.k]||[])[y]||0)+'</td>'}
    h+='</tr>';
  });
  h+='</tbody></table>';
  // Capex
  h+='<div class="sub-title">Capital Expenditure Schedule</div>';
  const capexLabels=['Land','Building','M&E','FF&E','Other'];
  h+='<table><thead><tr><th>Category</th>';
  for(let y=1;y<=5;y++)h+='<th class="n">Year '+y+'</th>';
  h+='<th class="n">Total</th></tr></thead><tbody>';
  P.capex.schedule.forEach((row,i)=>{
    const t=row.reduce((a,v)=>a+(+v||0),0);
    h+='<tr><td style="font-weight:500">'+capexLabels[i]+'</td>';
    row.forEach(v=>{h+='<td class="n">'+ff(+v||0)+'</td>'});
    h+='<td class="n" style="font-weight:600">'+ff(t)+'</td></tr>';
  });
  h+='</tbody><tfoot><tr><td style="font-weight:700">Total</td>';
  for(let y=0;y<5;y++){const t=P.capex.schedule.reduce((a,r)=>a+(+r[y]||0),0);h+='<td class="n">'+ff(t)+'</td>'}
  h+='<td class="n">'+ff(totalCapex)+'</td></tr></tfoot></table>';
  h+='</div>';

  // === TIMELINE ===
  h+='<div class="sec-break">';
  h+='<div class="sec-title">Project Timeline</div>';
  const tl=P.timeline||{weeks:10,phases:[],tasks:[]};
  const wks=tl.weeks||10;
  // Phase legend
  if(tl.phases&&tl.phases.length){
    h+='<div style="display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap">';
    tl.phases.forEach(p=>{
      const clr={p1:'#2563eb',p2:'#059669',p3:'#d97706',p4:'#7c3aed'}[p.color]||'#2563eb';
      h+='<div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;border-radius:2px;background:'+clr+'"></div><span style="font-size:9px;color:#5c5a55">'+esc(p.name)+'</span></div>';
    });
    h+='</div>';
  }
  // Gantt table
  h+='<table class="gt"><thead><tr><th>Task</th>';
  for(let w=1;w<=wks;w++)h+='<th>Wk '+w+'</th>';
  h+='</tr></thead><tbody>';
  (tl.tasks||[]).forEach(t=>{
    const ph=tl.phases[t.phase]||{color:'p1'};
    h+='<tr><td>'+esc(t.desc)+'</td>';
    for(let w=1;w<=wks;w++){
      h+='<td>'+(w>=t.start&&w<=t.end?'<div class="gb '+ph.color+'"></div>':'')+'</td>';
    }
    h+='</tr>';
  });
  h+='</tbody></table>';
  h+='</div>';

  h+='</body></html>';
  return h;
}

function buildSummaryReport(logo){
  const as=allSites();
  const sd=as.map(s=>{const c=costs10(s);const op=Object.values(c).reduce((a,b)=>a+b,0);return{...s,c,op,it:incTotal(s),net:op-incTotal(s),sc:wScore(s,P.weights),py:payroll(s),jb:jobs(s)}});
  const minNet=Math.min(...sd.map(x=>x.net));
  const maxSc=Math.max(...sd.map(x=>x.sc));
  const totalCapex=P.capex.schedule.reduce((a,r)=>a+r.reduce((x,y)=>x+(+y||0),0),0);
  const scoKeys=['ops','labor','biz','tax','inc','qual'];
  const scoLabels={ops:'Operating Costs',labor:'Labor',biz:'Business Climate',tax:'Tax Climate',inc:'Incentives',qual:'Qualitative'};
  const incKeys=['local','state','util','salesEx','utilSalesTax'];
  const incLabels={local:'Local',state:'State',util:'Utility',salesEx:'Sales Tax Exemption',utilSalesTax:'Utility Sales Tax'};

  let h='<!DOCTYPE html><html><head><meta charset="UTF-8"><title> </title><style>'+rptCSS()+'</style></head><body>';

  // Cover
  h+=rptCover(logo);

  // === EXECUTIVE SUMMARY ===
  h+='<div class="sec-break">';
  h+='<div class="sec-title">Executive Summary</div>';
  h+='<div class="kpi-grid c'+Math.min(sd.length+2,5)+'">';
  h+='<div class="kpi"><div class="lbl">Total Capex</div><div class="val">'+fm(totalCapex)+'</div></div>';
  h+='<div class="kpi"><div class="lbl">Jobs Created</div><div class="val">'+Number(P.jobs||sd.reduce((a,x)=>Math.max(a,x.jb),0)).toLocaleString()+'</div></div>';
  sd.forEach(s=>{
    h+='<div class="kpi"><div class="lbl">'+esc(s.name)+'</div><div class="val'+(s.net===minNet?' hi2':'')+'">'+fm(s.net)+'</div><div class="sub">Net 10-Year Cost</div></div>';
  });
  h+='</div>';

  // Best site callout
  const bestCost=sd.find(s=>s.net===minNet);
  const bestScore=sd.find(s=>s.sc===maxSc);
  if(bestCost){
    h+='<div class="best-box"><div class="lbl">Lowest Net 10-Year Cost</div><div class="val">'+esc(bestCost.name)+' &mdash; '+ff(bestCost.net)+'</div><div class="sub">'+esc(bestCost.stN)+'</div></div>';
  }
  if(bestScore&&bestScore.id!==bestCost.id){
    h+='<div class="best-box" style="border-color:#2563eb;background:#eff6ff"><div class="lbl" style="color:#2563eb">Highest Weighted Score</div><div class="val" style="color:#2563eb">'+esc(bestScore.name)+' &mdash; '+bestScore.sc.toFixed(2)+'</div><div class="sub">'+esc(bestScore.stN)+'</div></div>';
  } else if(bestScore){
    h+='<div style="text-align:center;font-size:10px;color:#059669;font-weight:600;margin-bottom:12px">Also ranked #1 in Weighted Scoring ('+bestScore.sc.toFixed(2)+')</div>';
  }

  // Site Rankings
  h+='<div class="sub-title">Site Rankings</div>';
  const maxScVal=Math.max(...sd.map(x=>x.sc),1);
  sd.slice().sort((a,b)=>b.sc-a.sc).forEach((s,i)=>{
    const pct=Math.round(s.sc/maxScVal*100);
    const colors=['#059669','#2563eb','#d97706','#7c3aed','#dc2626'];
    h+='<div class="bar-row"><div class="bar-lbl">#'+(i+1)+' '+esc(s.name)+'</div><div class="bar-trk"><div class="bar-fl" style="background:'+colors[i%5]+';width:'+Math.max(pct,8)+'%">'+s.sc.toFixed(2)+'</div></div></div>';
  });
  h+='</div>';

  // === COST & INCENTIVE SUMMARY ===
  h+='<div class="sec-break">';
  h+='<div class="sec-title">10-Year Cost &amp; Incentive Comparison</div>';
  // Summary table
  h+='<table><thead><tr><th>Rank</th><th>Site</th><th>State</th><th class="n">Operating Costs</th><th class="n">Incentives</th><th class="n">Net Cost</th></tr></thead><tbody>';
  sd.slice().sort((a,b)=>a.net-b.net).forEach((s,i)=>{
    h+='<tr'+(i===0?' style="font-weight:600"':'')+'>';
    h+='<td>'+(i+1)+'</td><td>'+esc(s.name)+'</td><td>'+esc(s.stN)+'</td>';
    h+='<td class="n">'+ff(s.op)+'</td>';
    h+='<td class="n" style="color:#059669">'+ff(s.it)+'</td>';
    h+='<td class="n'+(i===0?' hi2':'')+'">'+ff(s.net)+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table>';

  // Operating vs Incentives bars
  h+='<div class="sub-title">Operating Costs vs Incentives</div>';
  const maxBar=Math.max(...sd.map(x=>x.op));
  sd.forEach(s=>{
    const opPct=maxBar>0?Math.round(s.op/maxBar*100):0;
    const itPct=maxBar>0?Math.round(s.it/maxBar*100):0;
    h+='<div style="margin-bottom:8px"><div style="font-size:9px;font-weight:600;margin-bottom:3px">'+esc(s.name)+'</div>';
    h+='<div class="bar-row" style="margin-bottom:2px"><div class="bar-lbl" style="width:80px">Operating</div><div class="bar-trk"><div class="bar-fl cc0" style="width:'+Math.max(opPct,5)+'%">'+fm(s.op)+'</div></div></div>';
    h+='<div class="bar-row"><div class="bar-lbl" style="width:80px">Incentives</div><div class="bar-trk"><div class="bar-fl cc1" style="width:'+Math.max(itPct,5)+'%">'+fm(s.it)+'</div></div></div>';
    h+='</div>';
  });

  // Incentive totals by category
  h+='<div class="sub-title" style="margin-top:14px">Incentive Breakdown</div>';
  h+='<table><thead><tr><th>Category</th>';
  sd.forEach(s=>{h+='<th class="n">'+esc(s.name)+'</th>'});
  h+='</tr></thead><tbody>';
  incKeys.forEach(k=>{
    h+='<tr><td style="font-weight:500">'+incLabels[k]+'</td>';
    sd.forEach(s=>{const t=(s.inc[k]||[]).reduce((a,v)=>a+(+v||0),0);h+='<td class="n">'+ff(t)+'</td>'});
    h+='</tr>';
  });
  h+='</tbody><tfoot><tr><td style="font-weight:700">Total</td>';
  sd.forEach(s=>{h+='<td class="n" style="color:#059669;font-weight:700">'+ff(s.it)+'</td>'});
  h+='</tr></tfoot></table>';
  h+='</div>';

  // === SCORING OVERVIEW ===
  h+='<div class="sec-break">';
  h+='<div class="sec-title">Weighted Scoring Summary</div>';
  // Weights
  h+='<div class="sub-title">Weight of Criteria</div>';
  h+='<table style="width:auto;margin-bottom:16px"><thead><tr><th>Category</th><th class="n">Weight</th></tr></thead><tbody>';
  scoKeys.forEach(k=>{
    h+='<tr><td>'+scoLabels[k]+'</td><td class="n">'+pc(P.weights[k])+'</td></tr>';
  });
  h+='</tbody></table>';
  // Weighted summary table
  h+='<div class="sub-title">Weighted Scores</div>';
  h+='<table><thead><tr><th>Category</th><th class="n">Weight</th>';
  sd.forEach(s=>{h+='<th class="n">'+esc(s.name)+'</th>'});
  h+='</tr></thead><tbody>';
  scoKeys.forEach(k=>{
    h+='<tr><td style="font-weight:500">'+scoLabels[k]+'</td><td class="n">'+pc(P.weights[k])+'</td>';
    sd.forEach(s=>{h+='<td class="n">'+((s.scores[k]||0)*P.weights[k]*3).toFixed(2)+'</td>'});
    h+='</tr>';
  });
  h+='</tbody><tfoot><tr><td style="font-weight:700">Total</td><td></td>';
  sd.forEach(s=>{h+='<td class="n'+(s.sc===maxSc?' hi2':'')+'">'+s.sc.toFixed(2)+'</td>'});
  h+='</tr></tfoot></table>';
  // Rankings
  h+='<div class="sub-title">Final Rankings</div>';
  sd.slice().sort((a,b)=>b.sc-a.sc).forEach((s,i)=>{
    const pct=Math.round(s.sc/maxScVal*100);
    const colors=['#059669','#2563eb','#d97706','#7c3aed','#dc2626'];
    h+='<div class="bar-row"><div class="bar-lbl">#'+(i+1)+' '+esc(s.name)+'</div><div class="bar-trk"><div class="bar-fl" style="background:'+colors[i%5]+';width:'+Math.max(pct,8)+'%">'+s.sc.toFixed(2)+'</div></div></div>';
  });
  h+='</div>';

  h+='</body></html>';
  return h;
}

function editScoring(){

  s+='</div><p style="font-size:11px;color:var(--t3);margin-top:6px">Total: '+pc(Object.values(w).reduce((a,b)=>a+b,0))+'</p></div>';

      cats.forEach(([_,k])=>{s+='<td class="n"><input class="ci" type="number" min="0" max="3" step="0.01" value="'+(site.scores[k]||0)+'" data-f="'+pf+'.scores.'+k+'" style="width:55px"></td>'});

      // Phase

      ph.forEach((p,pi)=>{s+='<option value="'+pi+'"'+(t.phase==pi?' selected':'')+'>'+esc(p.name)+'</option>'});
      if(!ph.length)s+='<option value="0">\u2014</option>';
      s+='</select></td>';
      // Weeks
      s+='<td><input class="ci" type="number" min="1" max="'+wk+'" value="'+t.start+'" data-tk="'+i+'.start" style="width:55px"></td>';

      s+='</td></tr>';
    });

  // Live preview
  if(tk.length){
    s+='<div class="cd"><div class="ct">Gantt Preview</div>';
    s+='<div style="overflow-x:auto"><table class="gt"><thead><tr><th>Task</th>';
    for(let i=1;i<=wk;i++)s+='<th>Wk '+i+(i===wk?'+':'')+'</th>';
    s+='</tr></thead><tbody>';
    tk.forEach(t=>{
      const phase=ph[t.phase]||ph[0]||{color:'p1'};
      s+='<tr><td>'+esc(t.desc)+'</td>';
      for(let w=1;w<=wk;w++){
        if(w>=t.start&&w<=t.end)s+='<td><div class="gb '+phase.color+'"></div></td>';
        else s+='<td></td>';
      }
      s+='</tr>';
    });
    s+='</tbody></table></div>';
    if(ph.length){
      s+='<div class="g'+Math.min(ph.length,5)+'" style="margin-top:12px">';
      ph.forEach(p=>{
        const clr=phLabels[p.color]||'#4f8cff';
        const ptasks=tk.filter(t=>ph[t.phase]===p);
        const minW=ptasks.length?Math.min(...ptasks.map(t=>t.start)):0;
        const maxW=ptasks.length?Math.max(...ptasks.map(t=>t.end)):0;
        s+='<div class="sc"><div class="l">'+esc(p.name)+'</div><div class="v" style="color:'+clr+';font-size:12px">'+esc(p.name)+'</div>'+(minW?'<div class="s">Wk '+minW+'\u2013'+maxW+'</div>':'')+'</div>';
      });
      s+='</div>';
    }
    s+='</div>';
  }

  s+='</div>';return s;
}

var _ovCache={},_ovAbort={},_ovDebounce={};
function loadOverlay(map,group,btn,key,retried){
  var def=overlayDefs[key],svg=def.icon;
  if(map.getZoom()<def.minZoom){
    group.clearLayers();_ovCache[key]=null;
    btn.innerHTML=svg+' Zoom in';
    return;
  }
  var b=map.getBounds(),s=b.getSouth(),w=b.getWest(),n=b.getNorth(),e=b.getEast();
  // Check cache — skip fetch if current view is inside previously fetched bounds
  var c=_ovCache[key];
  if(c&&s>=c[0]&&w>=c[1]&&n<=c[2]&&e<=c[3]){return;}
  // Pad bounds 30% so small pans don't retrigger
  var padLat=(n-s)*0.3,padLng=(e-w)*0.3;
  var ps=s-padLat,pw=w-padLng,pn=n+padLat,pe=e+padLng;
  // Abort any in-flight request for this layer
  if(_ovAbort[key])_ovAbort[key].abort();
  var ac=new AbortController();_ovAbort[key]=ac;
  var area=(pn-ps)*(pe-pw),tout=area<0.1?10:25,outMode=def.type==='area'?'out geom;':'out skel geom;';
  var q='[out:json][timeout:'+tout+'];('+def.query+'('+ps+','+pw+','+pn+','+pe+'););'+outMode;
  btn.innerHTML=svg+' Loading\u2026';
  fetch('https://overpass-api.de/api/interpreter',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'data='+encodeURIComponent(q),signal:ac.signal})
  .then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(data){
    group.clearLayers();
    (data.elements||[]).forEach(function(el){
      if(el.geometry){
        var latlngs=el.geometry.map(function(p){return[p.lat,p.lon]});
        if(def.type==='area')L.polygon(latlngs,def.style).addTo(group);
        else L.polyline(latlngs,def.style).addTo(group);
      }
    });
    _ovCache[key]=[ps,pw,pn,pe];
    btn.innerHTML=svg+' '+def.label;
  }).catch(function(err){
    if(err.name==='AbortError')return;
    // Auto-retry once after 2s on server error (rate limiting)
    if(!retried){btn.innerHTML=svg+' Retrying\u2026';setTimeout(function(){loadOverlay(map,group,btn,key,true)},2000);}
    else{btn.innerHTML=svg+' '+def.label;}
  });
}
function loadAllOverlays(map,el){
  var b=map.getBounds(),s=b.getSouth(),w=b.getWest(),n=b.getNorth(),e=b.getEast();
  var padLat=(n-s)*0.3,padLng=(e-w)*0.3;
  var ps=s-padLat,pw=w-padLng,pn=n+padLat,pe=e+padLng;
  var bb=ps+','+pw+','+pn+','+pe;
  var area=(pn-ps)*(pe-pw),tout=area<0.1?10:30;
  var q='[out:json][timeout:'+tout+'];(way["railway"="rail"]('+bb+');way["highway"~"motorway|trunk"]('+bb+');way["power"="line"]('+bb+');way["landuse"="industrial"]('+bb+'););out tags geom;';
  var keys=['rail','highway','power','industrial'];
  // Tag-to-key mapping
  function tagKey(tags){if(tags.railway)return'rail';if(tags.highway)return'highway';if(tags.power)return'power';if(tags.landuse==='industrial')return'industrial';return null;}
  keys.forEach(function(k){var btn=document.getElementById('tog_'+k);if(btn)btn.innerHTML=overlayDefs[k].icon+' Loading\u2026';});
  fetch('https://overpass-api.de/api/interpreter',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'data='+encodeURIComponent(q)})
  .then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(data){
    keys.forEach(function(k){el._overlays[k].clearLayers()});
    (data.elements||[]).forEach(function(el2){
      if(!el2.geometry||!el2.tags)return;
      var k=tagKey(el2.tags);if(!k)return;
      var def=overlayDefs[k],latlngs=el2.geometry.map(function(p){return[p.lat,p.lon]});
      if(def.type==='area')L.polygon(latlngs,def.style).addTo(el._overlays[k]);
      else L.polyline(latlngs,def.style).addTo(el._overlays[k]);
    });
    keys.forEach(function(k){
      _ovCache[k]=[ps,pw,pn,pe];
      var btn=document.getElementById('tog_'+k);if(btn)btn.innerHTML=overlayDefs[k].icon+' '+overlayDefs[k].label;
    });
  }).catch(function(){
    keys.forEach(function(k){var btn=document.getElementById('tog_'+k);if(btn)btn.innerHTML=overlayDefs[k].icon+' '+overlayDefs[k].label;});
  });
}
function initQualMap(el,siteAddr,airports,ports){

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap'}).addTo(map);
  L.control.scale({imperial:true,metric:false,position:'bottomleft'}).addTo(map);
  el._map=map;el._overlays={};el._overlayOn={};el._siteLL=null;el._allBounds=null;
  ['rail','highway','power','industrial'].forEach(function(k){el._overlays[k]=L.layerGroup();el._overlayOn[k]=false;});
  var bounds=[],pending=0;
  function geocodeAndMark(addr,icon,label,isSite){
    pending++;
    fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(addr))
    .then(function(r){return r.json()}).then(function(d){
      if(d&&d[0]){var ll=[+d[0].lat,+d[0].lon];bounds.push(ll);if(isSite){el._siteLL=ll;}L.marker(ll,{icon:icon}).addTo(map).bindPopup('<b>'+label+'</b><br>'+addr);}
      pending--;if(!pending&&bounds.length){el._allBounds=L.latLngBounds(bounds);map.fitBounds(el._allBounds,{padding:[40,40],maxZoom:12,minZoom:6});}
    }).catch(function(){pending--;});
  }

  (airports||[]).forEach(function(ap){if(ap.addr)geocodeAndMark(ap.addr,qualMapIcon(svgAirplane(16),'#f59e0b'),ap.name||'Airport');});
  (ports||[]).forEach(function(pt){if(pt.addr)geocodeAndMark(pt.addr,qualMapIcon(svgShip(16),'#34d399'),pt.name||'Port');});
}

function viewScoring(){

  const w=P.weights,as=allSites();
  const cats=[['Operating Costs','ops'],['Labor','labor'],['Business Climate','biz'],['Tax Climate','tax'],['Incentives','inc'],['Qualitative','qual']];
  const sd=as.map(x=>({...x,t:wScore(x,w)}));
  const topScore=Math.max(...sd.map(x=>x.t)),topIdx=sd.findIndex(x=>x.t===topScore);
  const sColW=Math.floor(82/(as.length||1));

  let s='<div class="sec on"><div class="sh"><div><h1>Scoring Analysis</h1><p>Each aspect scored 1\u20133: 3 = above average, 2 = average, 1 = below average, 0 = N/A</p></div></div>';

  // Raw Scores Table
  s+='<div class="tw"><div class="tt">Raw Scores (1\u20133 Scale)</div><div style="overflow-x:auto"><table style="width:100%;table-layout:fixed"><thead><tr><th style="width:18%"></th>';
  as.forEach(x=>{s+='<th class="n" style="width:'+sColW+'%">'+esc(x.name)+'</th>'});
  s+='</tr></thead><tbody>';
  cats.forEach(([l,k])=>{
    const vs=as.map(x=>(x.scores[k]||0));
    const mx=Math.max(...vs.filter(v=>v>0));
    s+='<tr><td style="font-weight:600">'+l+'</td>';
    vs.forEach(v=>{
      const isBest=v===mx&&mx>0;

  // Weight of Criteria + Weighted Scoring side by side

  // Weight of Criteria panel (interactive sliders)
  s+='<div class="cd"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="ct" style="margin:0">Weight of Criteria</div><button class="bn bg" data-a="resetWt" style="font-size:10px;padding:4px 10px">\u21BA Reset</button></div>';
  cats.forEach(([l,k])=>{

  });
  const wTotal=Object.values(w).reduce((a,b)=>a+b,0);
  const totalColor=Math.abs(wTotal-1)<0.005?'var(--a2)':'var(--dn)';
  s+='<div class="it" style="margin-top:4px"><span class="k">Total</span><span id="wlbl_total" class="vv" style="color:'+totalColor+'">'+pc(wTotal)+'</span></div>';
  s+='</div>';

  // Top scores summary panel
  s+='<div class="cd"><div class="ct">Rankings</div><div id="scoreRankings">';
  const ranked=[...sd].sort((a,b)=>b.t-a.t);
  ranked.forEach((x,r)=>{
    const cl=r===0?'var(--a2)':r===1?'var(--a1)':'var(--a3)';
    const barW=topScore?(x.t/topScore*100).toFixed(1):'0';
    s+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;font-weight:600">#'+(r+1)+' '+esc(x.name)+'</span><span style="font-size:11px;font-weight:700;color:'+cl+'">'+x.t.toFixed(2)+'</span></div>';
    s+='<div style="height:6px;background:var(--c2);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+barW+'%;background:'+cl+';border-radius:3px"></div></div></div>';
  });
  s+='</div></div></div>';

  // Weighted Scoring Summary Table
  s+='<div class="tw" style="margin-top:12px"><div class="tt">Weighted Scoring Summary</div><div style="overflow-x:auto"><table style="width:100%;table-layout:fixed"><thead><tr><th style="width:14%">Category</th><th class="n" style="width:6%">Weight</th>';
  as.forEach(x=>{s+='<th class="n">'+esc(x.name)+'</th>'});
  s+='</tr></thead><tbody id="scoreWtTable">';
  cats.forEach(([l,k])=>{
    const wt=w[k]||0;
    const ws2=as.map(x=>((x.scores[k]||0)*wt*3));
    const mx=Math.max(...ws2.filter(v=>v>0));
    s+='<tr><td style="font-weight:600">'+l+'</td><td class="n">'+pc(wt)+'</td>';
    ws2.forEach(v=>{
      const isBest=v===mx&&mx>0;
      s+='<td class="n'+(isBest?' hi2':'')+'">'+v.toFixed(2)+'</td>';
    });
    s+='</tr>';
  });
  // Total row
  const tots=as.map(x=>wScore(x,w)),mt=Math.max(...tots);
  s+='<tr style="font-weight:700;border-top:2px solid var(--b1)"><td>Total</td><td></td>';
  tots.forEach((t,i)=>{
    const isBest=t===mt&&mt>0;
    s+='<td class="n'+(isBest?' hi2':'')+'" style="font-size:13px;color:var(--a1)">'+t.toFixed(2)+'</td>';
  });
  s+='</tr></tbody></table></div></div>';

  s+='</div>';return s;
}

function viewTimeline(){
  if(!P.timeline)P.timeline={weeks:10,phases:[],tasks:[]};
  const tl=P.timeline,ph=tl.phases||[],tk=tl.tasks||[],wk=tl.weeks||10;
  const phLabels={'p1':'#4f8cff','p2':'#34d399','p3':'#f59e0b','p4':'#a78bfa'};
  if(!tk.length)return'<div class="sec on"><div class="sh"><div><h1>Timeline</h1></div></div><div class="es"><h3>No timeline defined</h3><p>Switch to Edit mode \u2192 Timeline tab to set up the project schedule</p></div></div>';
  let s='<div class="sec on"><div class="sh"><div><h1>Project Timeline</h1><p>Site selection engagement workflow</p></div></div>';
  s+='<div class="tw" style="overflow-x:auto"><table class="gt"><thead><tr><th>Task</th>';
  for(let i=1;i<=wk;i++)s+='<th>Wk '+i+(i===wk?'+':'')+'</th>';
  s+='</tr></thead><tbody>';
  tk.forEach(t=>{
    const phase=ph[t.phase]||ph[0]||{color:'p1'};
    s+='<tr><td>'+esc(t.desc)+'</td>';
    for(let w=1;w<=wk;w++){
      if(w>=t.start&&w<=t.end)s+='<td><div class="gb '+phase.color+'"></div></td>';
      else s+='<td></td>';
    }
    s+='</tr>';
  });
  s+='</tbody></table></div>';
  if(ph.length){
    s+='<div class="g'+Math.min(ph.length,5)+'" style="margin-top:12px">';
    ph.forEach(p=>{
      const tasks=tk.filter(t=>ph[t.phase]===p);
      const minW=Math.min(...tk.filter(t=>ph[t.phase]===p).map(t=>t.start),99);
      const maxW=Math.max(...tk.filter(t=>ph[t.phase]===p).map(t=>t.end),0);
      s+='<div class="sc"><div class="l">'+esc(p.name)+'</div><div class="v" style="color:'+phLabels[p.color]+';font-size:12px">'+esc(p.name)+'</div>'+(minW<99?'<div class="s">Wk '+minW+'\u2013'+maxW+'</div>':'')+'</div>';
    });
    s+='</div>';
  }
  s+='</div>';return s;
}

// === EVENT BINDING ===
function bindEvents(){
  document.querySelectorAll('[data-n]').forEach(b=>b.onclick=()=>{curSec=b.dataset.n;render()});
  document.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>{mode=b.dataset.m;curSec=mode==='view'?'overview':'project';render()});
  document.querySelectorAll('[data-npv]').forEach(b=>b.onclick=()=>{const i=+b.dataset.npv;npvExp=npvExp===i?null:i;render()});
  document.querySelectorAll('[data-inc]').forEach(b=>b.onclick=()=>{const i=+b.dataset.inc;incExp=incExp===i?null:i;render()});
  document.querySelectorAll('[data-qual]').forEach(b=>b.onclick=()=>{const i=+b.dataset.qual;qualExp=qualExp===i?null:i;render()});
  document.querySelectorAll('[data-cost]').forEach(b=>b.onclick=()=>{const i=+b.dataset.cost;costExp=costExp===i?null:i;render()});
  var qm=document.getElementById('qualMapEl');if(qm&&typeof L!=='undefined'){var _aps=[];try{_aps=JSON.parse(qm.dataset.airports||'[]')}catch(e){}var _pts=[];try{_pts=JSON.parse(qm.dataset.ports||'[]')}catch(e){}initQualMap(qm,qm.dataset.site,_aps,_pts);}
  if(qm&&qm._map){
    function toggleOverlayOn(k){
      var btn=document.getElementById('tog_'+k),leg=document.getElementById('leg_'+k),grp=qm._overlays[k],m=qm._map;
      if(!btn||!grp||!m||qm._overlayOn[k])return;
      grp.addTo(m);qm._overlayOn[k]=true;btn.style.background='var(--a1)';btn.style.borderColor='var(--a1)';btn.style.color='#fff';if(leg)leg.style.display='flex';
      loadOverlay(m,grp,btn,k);qm['_move_'+k]=function(){clearTimeout(_ovDebounce[k]);_ovDebounce[k]=setTimeout(function(){if(qm._overlayOn[k])loadOverlay(m,grp,btn,k)},250)};m.on('moveend',qm['_move_'+k]);
    }
    ['rail','highway','power','industrial'].forEach(function(k){
      var btn=document.getElementById('tog_'+k),leg=document.getElementById('leg_'+k);
      if(!btn)return;
      btn.onclick=function(){var grp=qm._overlays[k],m=qm._map;if(!grp||!m)return;
        if(qm._overlayOn[k]){m.removeLayer(grp);grp.clearLayers();qm._overlayOn[k]=false;_ovCache[k]=null;btn.style.background='var(--c1)';btn.style.borderColor='var(--b1)';btn.style.color='var(--t2)';if(leg)leg.style.display='none';if(qm['_move_'+k]){m.off('moveend',qm['_move_'+k]);qm['_move_'+k]=null;}}
        else{toggleOverlayOn(k);}
      };
    });
    // Shared helper — zoom to site at given radius and enable all overlays
    function zoomSiteAndLoad(miles){
      var m=qm._map,ll=qm._siteLL;if(!m||!ll)return;
      var d=miles*0.0145;
      m.fitBounds([[ll[0]-d,ll[1]-d],[ll[0]+d,ll[1]+d]],{animate:false});
      ['rail','highway','power','industrial'].forEach(function(k){
        var btn=document.getElementById('tog_'+k),leg=document.getElementById('leg_'+k),grp=qm._overlays[k];
        if(!btn||!grp||qm._overlayOn[k])return;
        grp.addTo(m);qm._overlayOn[k]=true;btn.style.background='var(--a1)';btn.style.borderColor='var(--a1)';btn.style.color='#fff';if(leg)leg.style.display='flex';
        qm['_move_'+k]=function(){clearTimeout(_ovDebounce[k]);_ovDebounce[k]=setTimeout(function(){if(qm._overlayOn[k])loadOverlay(m,grp,btn,k)},250)};m.on('moveend',qm['_move_'+k]);
      });
      loadAllOverlays(m,qm);
    }
    // Site 3mi — zoom tight, overlays load near-instantly at this scale
    var s3=document.getElementById('viewSite3');if(s3){s3.onclick=function(){zoomSiteAndLoad(3);};}
    // Site 10mi
    var s10=document.getElementById('viewSite10');if(s10){s10.onclick=function(){zoomSiteAndLoad(10);};};
    // Full View — fit all markers
    var fv=document.getElementById('viewFull');if(fv){fv.onclick=function(){
      var m=qm._map,ab=qm._allBounds;if(!m||!ab)return;
      m.fitBounds(ab,{padding:[40,40]});
    };}
  }
  document.querySelectorAll('[data-wt]').forEach(el=>{el.addEventListener('input',()=>{
    P.weights[el.dataset.wt]=+el.value/100;
    // Update label for this slider
    var lbl=document.getElementById('wlbl_'+el.dataset.wt);if(lbl)lbl.textContent=(+el.value)+'%';
    // Update total
    var wt=P.weights,tot=Object.values(wt).reduce((a,b)=>a+b,0);
    var tLbl=document.getElementById('wlbl_total');if(tLbl){tLbl.textContent=pc(tot);tLbl.style.color=Math.abs(tot-1)<0.005?'var(--a2)':'var(--dn)';}
    // Update rankings panel
    var rp=document.getElementById('scoreRankings');
    if(rp){
      var as2=allSites(),sd2=as2.map(function(x){return Object.assign({},x,{t:wScore(x,wt)})});
      var ranked2=[].concat(sd2).sort(function(a,b){return b.t-a.t});
      var ts=Math.max.apply(null,ranked2.map(function(x){return x.t}));
      var rh='';ranked2.forEach(function(x,r){
        var cl=r===0?'var(--a2)':r===1?'var(--a1)':'var(--a3)';
        var bw=ts?(x.t/ts*100).toFixed(1):'0';
        rh+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;font-weight:600">#'+(r+1)+' '+esc(x.name)+'</span><span style="font-size:11px;font-weight:700;color:'+cl+'">'+x.t.toFixed(2)+'</span></div>';
        rh+='<div style="height:6px;background:var(--c2);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+bw+'%;background:'+cl+';border-radius:3px"></div></div></div>';
      });rp.innerHTML=rh;
    }
    // Update weighted scoring table
    var wst=document.getElementById('scoreWtTable');
    if(wst){
      var as3=allSites(),cats2=[['Operating Costs','ops'],['Labor','labor'],['Business Climate','biz'],['Tax Climate','tax'],['Incentives','inc'],['Qualitative','qual']];
      var tb='';cats2.forEach(function(c){
        var l=c[0],k=c[1],wv=wt[k]||0;
        var ws3=as3.map(function(x){return(x.scores[k]||0)*wv*3});
        var mx=Math.max.apply(null,ws3.filter(function(v){return v>0}));
        tb+='<tr><td style="font-weight:600">'+l+'</td><td class="n">'+pc(wv)+'</td>';
        ws3.forEach(function(v){tb+='<td class="n'+(v===mx&&mx>0?' hi2':'')+'">'+v.toFixed(2)+'</td>'});
        tb+='</tr>';
      });
      var tots2=as3.map(function(x){return wScore(x,wt)}),mt2=Math.max.apply(null,tots2);
      tb+='<tr style="font-weight:700;border-top:2px solid var(--b1)"><td>Total</td><td></td>';
      tots2.forEach(function(t){tb+='<td class="n'+(t===mt2&&mt2>0?' hi2':'')+'" style="font-size:13px;color:var(--a1)">'+t.toFixed(2)+'</td>'});
      tb+='</tr>';wst.innerHTML=tb;
    }
    save();
  })});
  document.querySelectorAll('[data-si]').forEach(b=>{if(!b.dataset.a)b.onclick=e=>{if(e.target.dataset.rs!==undefined)return;curSt=+b.dataset.si;curSi=0;render()}});
  document.querySelectorAll('[data-sii]').forEach(b=>{if(!b.dataset.a)b.onclick=e=>{if(e.target.dataset.rsi!==undefined)return;curSi=+b.dataset.sii;render()}});
  document.querySelectorAll('[data-rs]').forEach(b=>b.onclick=e=>{e.stopPropagation();const i=+b.dataset.rs;if(confirm('Remove "'+P.states[i].name+'"?')){P.states.splice(i,1);curSt=Math.max(0,curSt-1);save();render()}});
  document.querySelectorAll('[data-rsi]').forEach(b=>b.onclick=e=>{e.stopPropagation();const[si,sii]=b.dataset.rsi.split('.').map(Number);if(confirm('Remove "'+P.states[si].sites[sii].name+'"?')){P.states[si].sites.splice(sii,1);curSi=Math.max(0,curSi-1);save();render()}});
  document.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>{
    const a=b.dataset.a;
    if(a==='addSt'){const n=prompt('State name:');if(n){P.states.push(mkState(n));curSt=P.states.length-1;curSi=0;save();render()}}
    else if(a==='addSi'){const si=+b.dataset.st,n=prompt('Site name:');if(n&&P.states[si]){P.states[si].sites.push(mkSite(n));curSi=P.states[si].sites.length-1;save();render()}}
    else if(a==='addOcc'){const si=+b.dataset.st,sii=+b.dataset.si2;if(!P.states[si].sites[sii].labor.occs)P.states[si].sites[sii].labor.occs=[];P.states[si].sites[sii].labor.occs.push(mkOcc());save();render()}
    else if(a==='rmOcc'){const si=+b.dataset.st,sii=+b.dataset.si2,oi=+b.dataset.oi;P.states[si].sites[sii].labor.occs.splice(oi,1);save();render()}
    else if(a==='addAirport'){const si=+b.dataset.st,sii=+b.dataset.si2;const q=P.states[si].sites[sii].qual;if(!q.airports)q.airports=[];q.airports.push({name:'',addr:''});save();render()}
    else if(a==='rmAirport'){const si=+b.dataset.st,sii=+b.dataset.si2,ai=+b.dataset.ai;P.states[si].sites[sii].qual.airports.splice(ai,1);save();render()}
    else if(a==='addPort'){const si=+b.dataset.st,sii=+b.dataset.si2;const q=P.states[si].sites[sii].qual;if(!q.ports)q.ports=[];q.ports.push({name:'',addr:''});save();render()}
    else if(a==='rmPort'){const si=+b.dataset.st,sii=+b.dataset.si2,pi=+b.dataset.pi2;P.states[si].sites[sii].qual.ports.splice(pi,1);save();render()}
    else if(a==='exp')exportP();
    else if(a==='newProj'){if(confirm('Start a new project? All unsaved changes will be lost.')){P=mkProject();save();render();showToast('New project created')}}
    else if(a==='searchProj'){searchOpen=true;render()}
    else if(a==='closeSearch'){searchOpen=false;render()}
    else if(a==='resetWt'){if(savedWeights){P.weights={...savedWeights};save();savedWeights=null;render()}}
    else if(a==='addPhase'){if(!P.timeline)P.timeline={weeks:10,phases:[],tasks:[]};P.timeline.phases.push({name:'New Phase',color:['p1','p2','p3','p4'][P.timeline.phases.length%4]});save();render()}
    else if(a==='rmPhase'){const pi=+b.dataset.pi;P.timeline.phases.splice(pi,1);P.timeline.tasks.forEach(t=>{if(t.phase>=pi&&t.phase>0)t.phase--});save();render()}
    else if(a==='addTask'){if(!P.timeline)P.timeline={weeks:10,phases:[],tasks:[]};P.timeline.tasks.push({desc:'',phase:0,start:1,end:2});save();render()}
    else if(a==='rmTask'){P.timeline.tasks.splice(+b.dataset.ti,1);save();render()}
    else if(a==='moveUp'){const i=+b.dataset.ti;if(i>0){const t=P.timeline.tasks;[t[i-1],t[i]]=[t[i],t[i-1]];save();render()}}
    else if(a==='moveDown'){const i=+b.dataset.ti;const t=P.timeline.tasks;if(i<t.length-1){[t[i],t[i+1]]=[t[i+1],t[i]];save();render()}}
    else if(a==='insertAbove'){const i=+b.dataset.ti;P.timeline.tasks.splice(i,0,{desc:'',phase:0,start:1,end:2});save();render()}
    else if(a==='theme'){theme=theme==='dark'?'light':'dark';localStorage.setItem('kea_theme',theme);applyTheme();render()}
    else if(a==='imp'){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{if(e.target.files[0])importP(e.target.files[0])};inp.click()}
    else if(a==='pdfDetail')generateReport('detailed');
    else if(a==='pdfSummary')generateReport('summary');
  });
  // Search modal button
  const sBtn=document.getElementById('sBtn');
  if(sBtn)sBtn.addEventListener('click',()=>{
    const res=document.getElementById('sResults');
    if(res)res.innerHTML='<p style="color:var(--t3);text-align:center;padding:24px 0">No database connected &mdash; this feature will be available when the backend is configured.</p>';
  });
  let st;
  document.querySelectorAll('[data-f]').forEach(el=>{
    const isCfmt=el.classList.contains('cfmt');
    el.addEventListener('input',()=>{
      let v=el.value;
      if(isCfmt){v=+(v.replace(/,/g,''))||0;nSet(P,el.dataset.f,v)}
      else{if(el.type==='number')v=v===''?0:+v;nSet(P,el.dataset.f,v)}
      clearTimeout(st);st=setTimeout(()=>save(),400);
    });
    if(isCfmt)el.addEventListener('blur',()=>{const n=+(el.value.replace(/,/g,''))||0;el.value=n?n.toLocaleString():''});
  });
  // Timeline weeks
  document.querySelectorAll('[data-tl]').forEach(el=>{
    el.addEventListener('input',()=>{
      if(!P.timeline)P.timeline={weeks:10,phases:[],tasks:[]};
      const k=el.dataset.tl;let v=el.type==='number'?(+el.value||10):el.value;
      P.timeline[k]=v;save();
    });
  });
  // Timeline phases
  document.querySelectorAll('[data-ph]').forEach(el=>{
    const ev=el.tagName==='SELECT'?'change':'input';
    el.addEventListener(ev,()=>{
      const[i,k]=el.dataset.ph.split('.');
      P.timeline.phases[+i][k]=el.value;save();
    });
  });
  // Timeline tasks
  document.querySelectorAll('[data-tk]').forEach(el=>{
    const isCE=el.hasAttribute('contenteditable');
    const ev=el.tagName==='SELECT'?'change':'input';
    el.addEventListener(ev,()=>{
      const[i,k]=el.dataset.tk.split('.');
      let v=isCE?el.textContent:el.value;if(el.type==='number')v=+v||0;if(k==='phase')v=+v;
      P.timeline.tasks[+i][k]=v;
      if(isCE){clearTimeout(st);st=setTimeout(()=>save(),400)}
      else{clearTimeout(st);st=setTimeout(()=>{save();render()},600)}
    });
    if(isCE){el.addEventListener('focus',()=>{el.style.borderColor='var(--a1)';el.style.background='var(--c2)'});el.addEventListener('blur',()=>{el.style.borderColor='transparent';el.style.background=''})}
  });
  // Drag and drop for task reordering
  let dragIdx=null;
  document.querySelectorAll('[data-dti]').forEach(row=>{
    row.addEventListener('dragstart',e=>{dragIdx=+row.dataset.dti;row.style.opacity='.4';e.dataTransfer.effectAllowed='move'});
    row.addEventListener('dragend',()=>{row.style.opacity='1';dragIdx=null;document.querySelectorAll('[data-dti]').forEach(r=>r.style.borderTop='')});
    row.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';row.style.borderTop='2px solid var(--a1)'});
    row.addEventListener('dragleave',()=>{row.style.borderTop=''});
    row.addEventListener('drop',e=>{
      e.preventDefault();row.style.borderTop='';
      const dropIdx=+row.dataset.dti;
      if(dragIdx!==null&&dragIdx!==dropIdx){
        const t=P.timeline.tasks,item=t.splice(dragIdx,1)[0];
        t.splice(dropIdx,0,item);save();render();
      }
    });
  });
}

render();
